name: Scanner E2E
run-name: ${{ format('Scanner E2E - {0}', github.ref_name) }}

on:
  workflow_dispatch:
  push:
    paths:
      - "server/src/modules/scanner/**"
      - "server/test/scanner*"
      - "server/test/e2e/**"
      - "server/src/db/schema/**"
      - "scripts/test/**"
      - "scripts/db/**"
  pull_request:
    paths:
      - "server/src/modules/scanner/**"
      - "server/test/scanner*"
      - "server/test/e2e/**"
      - "server/src/db/schema/**"
      - "scripts/test/**"
      - "scripts/db/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  scanner-e2e:
    uses: ./.github/workflows/e2e-runner.yml
    with:
      suite-script: test:e2e:scanner
      check-name: Server Scanner E2E
      artifact-name: scanner-e2e-report
      junit-glob: test-results/server/scanner-e2e-junit.xml
      job-timeout-minutes: 45
